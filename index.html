<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0e0d;min-height:100vh;}
#gw{
  width:100%;min-height:100vh;background:#0a0e0d;
  display:flex;flex-direction:column;align-items:center;
  position:relative;overflow:hidden;font-family:'Georgia',serif;
}
canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%;}
#ui{position:relative;z-index:10;width:100%;display:flex;flex-direction:column;align-items:center;padding:18px 0 0;pointer-events:none;}
#timer{font-size:44px;font-weight:300;letter-spacing:0.1em;color:#e8c97a;line-height:1;}
#tunit{font-size:11px;letter-spacing:0.3em;color:rgba(232,201,122,0.45);margin-top:3px;}
#best{font-size:11px;letter-spacing:0.2em;color:rgba(255,255,255,0.2);margin-top:5px;}
#sname{font-size:12px;letter-spacing:0.35em;color:rgba(232,201,122,0.55);margin-top:8px;min-height:16px;}
#msg{font-size:12px;letter-spacing:0.25em;color:rgba(255,255,255,0.38);margin-top:22px;min-height:16px;text-align:center;}
#wind-indicator{position:relative;z-index:10;margin-top:10px;font-size:10px;letter-spacing:0.2em;color:rgba(255,255,255,0.18);min-height:14px;pointer-events:none;}
#overlay{position:absolute;z-index:20;inset:0;background:rgba(4,8,7,0.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
#ov-title{font-size:21px;letter-spacing:0.32em;color:#e8c97a;text-shadow:0 0 28px rgba(232,201,122,0.3);}
#ov-sub{font-size:11px;letter-spacing:0.2em;color:rgba(255,255,255,0.28);line-height:2.4;text-align:center;}
#ov-time{font-size:52px;font-weight:300;color:#e8c97a;letter-spacing:0.05em;display:none;}
#ov-unit{font-size:11px;letter-spacing:0.3em;color:rgba(232,201,122,0.45);margin-top:-6px;display:none;}
#ov-rec{font-size:11px;letter-spacing:0.2em;margin-top:4px;min-height:14px;display:none;}
#ov-label{font-size:12px;letter-spacing:0.38em;color:rgba(255,255,255,0.28);display:none;}
.obtn{margin-top:20px;background:none;border:0.5px solid rgba(232,201,122,0.32);color:rgba(232,201,122,0.65);font-size:11px;letter-spacing:0.38em;padding:10px 30px;cursor:pointer;font-family:'Georgia',serif;transition:all 0.3s;}
.obtn:hover{border-color:rgba(232,201,122,0.7);color:#e8c97a;}
#mic-status{font-size:10px;letter-spacing:0.15em;color:rgba(255,255,255,0.15);margin-top:6px;min-height:12px;}
</style>
</head>
<body>
<div id="gw">
  <canvas id="c"></canvas>
  <div id="ui">
    <div id="timer">0.0</div>
    <div id="tunit">seconds</div>
    <div id="best">best — —</div>
    <div id="sname"></div>
    <div id="msg">揺れに合わせて、そっと。</div>
    <div id="wind-indicator"></div>
    <div id="mic-status"></div>
  </div>
  <div id="overlay">
    <div id="ov-title">線香花火</div>
    <div id="ov-sub">花火は蕾から松葉へ、やがて散り菊へ。<br>まわりの音が風になって揺れる。<br>60秒間、落とさずに燃やし続けて。</div>
    <div id="ov-label">落ちました</div>
    <div id="ov-time">0.0</div>
    <div id="ov-unit">seconds</div>
    <div id="ov-rec"></div>
    <button class="obtn" id="ov-btn" onclick="startGame()">はじめる</button>
  </div>
</div>

function b64ToArrayBuffer(b64){
  const bin=atob(b64), buf=new ArrayBuffer(bin.length), view=new Uint8Array(buf);
  for(let i=0;i<bin.length;i++) view[i]=bin.charCodeAt(i);
  return buf;
}

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){const w=document.getElementById('gw');W=canvas.width=w.offsetWidth;H=canvas.height=w.offsetHeight||540;}
resize();window.addEventListener('resize',resize);

// ── AudioContext & Buffers ──
let audioCtx=null,audioBuffers={};
async function initAudio(){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  for(const [key,b64] of Object.entries(AUDIO_B64)){
    try{
      const buf=b64ToArrayBuffer(b64);
      audioBuffers[key]=await audioCtx.decodeAudioData(buf);
    }catch(e){console.warn('audio decode failed:',key,e);}
  }
}
function playBuffer(key,loop=false,vol=1){
  if(!audioCtx||!audioBuffers[key])return null;
  const src=audioCtx.createBufferSource();
  src.buffer=audioBuffers[key];
  src.loop=loop;
  const g=audioCtx.createGain();
  g.gain.value=vol;
  src.connect(g);g.connect(audioCtx.destination);
  src.start();
  return{src,gain:g};
}
function stopNode(node){if(node){try{node.src.stop(0);}catch(e){}}}

let loopNode=null; // 線香花火ループ音

function startAmbientSound(){
  stopNode(loopNode);
  loopNode=playBuffer('senkou',true,0.55);
}
function stopAmbientSound(){
  if(!loopNode) return;
  const node = loopNode;
  loopNode = null;
  try {
    node.gain.gain.cancelScheduledValues(audioCtx.currentTime);
    node.gain.gain.setValueAtTime(0, audioCtx.currentTime);
  } catch(e){}
  try { node.src.stop(0); } catch(e){}
}

// 落下音
function playFallSound(){
  playBuffer('end',false,0.85);
}
// ステージ変化音
function playStageSound(){
  playBuffer('hanabi1',false,0.45);
}

// ── マイク（音量→風）──
let micStream=null,analyser=null,micData=null;
let windStrength=0,windImpulse=0; // 0〜1

async function initMic(){
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    const src=audioCtx.createMediaStreamSource(micStream);
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=256;
    src.connect(analyser);
    micData=new Uint8Array(analyser.frequencyBinCount);
    document.getElementById('mic-status').textContent='🎤 周囲の音が風になります';
  }catch(e){
    document.getElementById('mic-status').textContent='（マイクなし：自然な揺れのみ）';
  }
}

function updateWind(){
  if(!analyser||!micData){windStrength*=0.90;windImpulse*=0.7;return;}
  analyser.getByteFrequencyData(micData);
  let sum=0, peak=0;
  for(let i=0;i<micData.length;i++){
    sum+=micData[i];
    if(micData[i]>peak) peak=micData[i];
  }
  const avg=sum/micData.length;
  // 通常の風：平均音量ベース（低めの閾値で反応）
  const target=Math.min(1, avg/22);
  windStrength=windStrength*0.80+target*0.20;
  // 瞬間衝撃：ピークが大きければ即座に強い力（大声・手拍子で落とす）
  if(peak>180){
    const impulseDir=Math.random()<0.5?1:-1;
    windImpulse=impulseDir*(peak/255)*0.06;
  } else {
    windImpulse*=0.6;
  }
}

// ── ジャイロ ──
async function initGyro(){
  // iOS13+はpermission requestが必要
  if(typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function'){
    try{
      const perm = await DeviceOrientationEvent.requestPermission();
      if(perm === 'granted') setupGyroListener();
      else document.getElementById('mic-status').textContent+=' / ジャイロ拒否';
    }catch(e){ setupGyroListener(); }
  } else if(typeof DeviceOrientationEvent !== 'undefined'){
    setupGyroListener();
  }
}
function setupGyroListener(){
  gyroEnabled=true;
  window.addEventListener('deviceorientation', e=>{
    if(state!=='playing') return;
    // gamma: 左右傾き(-90〜90)
    gyroGamma = e.gamma || 0;
  });
  document.getElementById('mic-status').textContent += ' / 📱ジャイロ有効';
}

// ── State ──
let state='idle',startTime=0,elapsed=0,bestTime=0,frame=0,stage=0;
const STAGE_T=[0,15,37,53]; // 60秒に収める
const STAGE_NAMES=['蕾','牡丹','松葉','散り菊'];
const MAX_T=60;

// ── Rope ──
const SEG=8,SEG_LEN=20;
let segA=[],segV=[];
let ballFallen=false,fallenX=0,fallenY=0,fallVY=0,ropeVisible=true;

let np1,np2,np3,nf1,nf2,nf3;
function initNoise(){
  np1=Math.random()*Math.PI*2;np2=Math.random()*Math.PI*2;np3=Math.random()*Math.PI*2;
  nf1=0.012+Math.random()*0.005;nf2=0.021+Math.random()*0.007;nf3=0.005+Math.random()*0.003;
}
function naturalForce(){
  const amps=[0.0018,0.0025,0.0033,0.0042];
  const base=(Math.sin(frame*nf1+np1)+Math.sin(frame*nf2+np2)*0.4+Math.sin(frame*nf3+np3)*0.22)*amps[stage];
  // 風（マイク音量）を加算：風は方向がランダムに変化
  const windDir=Math.sin(frame*0.03+np1)*0.7+Math.sin(frame*0.011+np2)*0.3;
  const windForce=windStrength*windDir*0.022;
  // 瞬間衝撃（大声・手拍子）
  return base+windForce+windImpulse;
}

const SX=()=>W*0.5,SY=()=>H*0.14;
const MAX_OFF=0.40;
let prevMX=-999,mouseDelta=0;
let gyroEnabled=false,gyroGamma=0,gyroDelta=0,prevGyroGamma=null;

function getBall(){let x=SX(),y=SY();for(let i=0;i<SEG;i++){x+=Math.cos(segA[i])*SEG_LEN;y+=Math.sin(segA[i])*SEG_LEN;}return{x,y};}
function getSegPts(){const pts=[{x:SX(),y:SY()}];let x=SX(),y=SY();for(let i=0;i<SEG;i++){x+=Math.cos(segA[i])*SEG_LEN;y+=Math.sin(segA[i])*SEG_LEN;pts.push({x,y});}return pts;}
function updateRope(nf,md){
  segV[SEG-1]+=nf;
  if(md!==0){const c=0.0016;segV[SEG-1]-=md*c;segV[SEG-2]-=md*c*0.45;}
  for(let i=0;i<SEG;i++){
    segV[i]+=(Math.PI/2-segA[i])*(0.010+i*0.003);
    if(i>0){const d=segA[i]-segA[i-1];segV[i]-=d*0.16;segV[i-1]+=d*0.16;}
    segV[i]*=0.83;segA[i]+=segV[i];
  }
}

// ── Live branches ──
let liveBranches=[];
const STAGE_CFG=[
  null,
  {arms:5,armLen:()=>22+Math.random()*14,armSpread:0.7,children:1,childLen:()=>10+Math.random()*8,childSpread:0.5,spawnRate:6,maxBranches:8},
  {arms:8,armLen:()=>32+Math.random()*20,armSpread:1.1,children:2,childLen:()=>12+Math.random()*10,childSpread:0.4,spawnRate:4,maxBranches:14},
  {arms:9,armLen:()=>40+Math.random()*22,armSpread:1.3,children:2,childLen:()=>15+Math.random()*12,childSpread:0.55,spawnRate:3,maxBranches:16,droop:true},
];

function spawnBranch(ball){
  if(stage===0)return;
  const cfg=STAGE_CFG[stage];if(!cfg)return;
  if(liveBranches.length>=cfg.maxBranches)return;
  const biasedAngle=cfg.droop
    ?Math.PI/2+(Math.random()-0.3)*cfg.armSpread*1.4
    :Math.random()*Math.PI*2;
  const len=cfg.armLen();
  const life=28+Math.random()*35;
  const children=[];
  for(let j=0;j<cfg.children;j++){
    children.push({angle:biasedAngle+(Math.random()-0.5)*cfg.childSpread*2,len:cfg.childLen()});
  }
  liveBranches.push({x:ball.x,y:ball.y,angle:biasedAngle,len,children,life,maxLife:life,width:1.2+Math.random()*1.0,sway:0,swayV:(Math.random()-0.5)*0.01});
}

function updateBranches(ball){
  liveBranches=liveBranches.filter(b=>b.life>0);
  for(const b of liveBranches){
    b.x=ball.x;b.y=ball.y;b.life--;
    b.swayV+=(Math.random()-0.5)*0.003;b.swayV*=0.9;b.sway+=b.swayV;
    b.angle+=b.sway*0.02;
    b.currentLen=b.len*(0.3+(b.life/b.maxLife)*0.7);
  }
}

function drawBranches(){
  for(const b of liveBranches){
    const t=b.life/b.maxLife;
    const alpha=t<0.15?(t/0.15)*0.9:0.9;
    const g=180+Math.floor(t*60);
    ctx.save();ctx.globalAlpha=alpha;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.shadowColor=`rgba(255,${g},20,0.6)`;ctx.shadowBlur=8+t*6;
    const ex=b.x+Math.cos(b.angle)*b.currentLen,ey=b.y+Math.sin(b.angle)*b.currentLen;
    ctx.strokeStyle=`rgba(255,${g},30,${alpha})`;ctx.lineWidth=b.width*(0.5+t*0.5);
    ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(ex,ey);ctx.stroke();
    ctx.shadowBlur=0;ctx.strokeStyle=`rgba(255,248,200,${alpha*0.6*t})`;ctx.lineWidth=b.width*0.3;
    ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(ex,ey);ctx.stroke();
    for(const ch of b.children){
      const ca=ch.angle+b.sway*0.015,cLen=ch.len*(0.4+t*0.6);
      const cx2=ex+Math.cos(ca)*cLen,cy2=ey+Math.sin(ca)*cLen;
      ctx.shadowColor=`rgba(255,${g},20,0.5)`;ctx.shadowBlur=5;
      ctx.strokeStyle=`rgba(255,${g},30,${alpha*0.85})`;ctx.lineWidth=b.width*0.55*(0.5+t*0.5);
      ctx.beginPath();ctx.moveTo(ex,ey);ctx.lineTo(cx2,cy2);ctx.stroke();
      ctx.shadowBlur=0;ctx.strokeStyle=`rgba(255,248,200,${alpha*0.5*t})`;ctx.lineWidth=b.width*0.18;
      ctx.beginPath();ctx.moveTo(ex,ey);ctx.lineTo(cx2,cy2);ctx.stroke();
      if(t>0.3){ctx.fillStyle=`rgba(255,240,160,${alpha*t*0.8})`;ctx.shadowColor='rgba(255,200,50,0.9)';ctx.shadowBlur=6;ctx.beginPath();ctx.arc(cx2,cy2,1.2,0,Math.PI*2);ctx.fill();}
    }
    if(t>0.2){ctx.fillStyle=`rgba(255,235,140,${alpha*t})`;ctx.shadowColor='rgba(255,180,40,1)';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(ex,ey,1.6,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  }
}

// ── Particles ──
let particles=[];
function addSpark(ball,n,fast){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,spd=fast?(1+Math.random()*3):(0.3+Math.random()*1.6);
    particles.push({type:'spark',x:ball.x,y:ball.y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-0.5,
      life:25+Math.random()*45,maxLife:70,size:0.5+Math.random()*1.1,grav:0.045+Math.random()*0.03,
      col:Math.random()<0.5?'#ffcc44':(Math.random()<0.5?'#ff9933':'#ffee88')});
  }
}
function addEmber(ball,n){
  for(let i=0;i<n;i++)
    particles.push({type:'ember',x:ball.x,y:ball.y,vx:(Math.random()-0.5)*1.8,vy:-Math.random()*1.2-0.2,
      life:12+Math.random()*18,maxLife:30,size:0.9+Math.random()*0.6});
}
function updateParticles(){
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){
    p.x+=p.vx;p.y+=p.vy;
    if(p.type==='spark'){p.vy+=p.grav;p.vx*=0.97;}
    else{p.vy+=0.06;p.vx*=0.95;}
    p.life--;
  }
}
function drawParticles(){
  for(const p of particles){
    const a=(p.life/p.maxLife)*(p.type==='spark'?0.8:0.55);
    ctx.save();ctx.globalAlpha=a;
    ctx.fillStyle=p.type==='spark'?p.col:'#ff5511';
    ctx.shadowColor=p.type==='spark'?p.col:'#ff3300';ctx.shadowBlur=4;
    const r=p.type==='spark'?p.size*(p.life/p.maxLife):p.size;if(r<=0)continue;
    ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.1,r),0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

function drawRopeAndBall(){
  if(!ropeVisible)return;
  const pts=getSegPts(),ball=pts[pts.length-1];
  ctx.save();ctx.strokeStyle='#7a5530';ctx.lineWidth=2.2;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length-1;i++){const mx=(pts[i].x+pts[i+1].x)/2,my=(pts[i].y+pts[i+1].y)/2;ctx.quadraticCurveTo(pts[i].x,pts[i].y,mx,my);}
  ctx.lineTo(ball.x,ball.y);ctx.stroke();ctx.restore();
  const gg=ctx.createRadialGradient(ball.x,ball.y,0,ball.x,ball.y,60);
  gg.addColorStop(0,'rgba(255,140,30,0.08)');gg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gg;ctx.beginPath();ctx.arc(ball.x,ball.y,60,0,Math.PI*2);ctx.fill();
  ctx.save();ctx.shadowColor='rgba(255,140,30,0.85)';ctx.shadowBlur=16;
  const gb=ctx.createRadialGradient(ball.x-1.5,ball.y-1.5,0.5,ball.x,ball.y,9);
  gb.addColorStop(0,'rgba(255,252,220,1)');gb.addColorStop(0.35,'rgba(255,160,40,0.95)');gb.addColorStop(0.7,'rgba(220,80,10,0.7)');gb.addColorStop(1,'rgba(140,40,0,0.3)');
  ctx.beginPath();ctx.arc(ball.x,ball.y,9,0,Math.PI*2);ctx.fillStyle=gb;ctx.fill();
  ctx.strokeStyle='rgba(255,200,80,0.22)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(ball.x,ball.y,11,0,Math.PI*2);ctx.stroke();
  ctx.restore();
  // 傾き警告
  const off=segA[SEG-1]-Math.PI/2,danger=Math.min(1,Math.abs(off)/MAX_OFF);
  if(danger>0.3){
    const side=off>0?1:-1,bx=side>0?W-11:9;
    ctx.save();ctx.globalAlpha=(danger-0.3)*0.85;ctx.strokeStyle=danger>0.7?'#ff3311':'#cc8822';
    ctx.lineWidth=3;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(bx,H*0.1);ctx.lineTo(bx,H*0.1+H*0.4*danger);ctx.stroke();ctx.restore();
  }
}

function drawFallen(){
  if(!ballFallen)return;
  fallVY+=0.28;
  fallenY+=fallVY;
  const t=Math.max(0,1-fallVY/32);
  if(t<=0){ballFallen=false;return;}
  const r=9-fallVY*0.1;
  ctx.save();
  ctx.globalAlpha=t;
  ctx.shadowColor='rgba(255,140,30,0.9)';ctx.shadowBlur=14;
  const gb=ctx.createRadialGradient(fallenX-1.5,fallenY-1.5,0.5,fallenX,fallenY,Math.max(2,r));
  gb.addColorStop(0,'rgba(255,252,220,1)');
  gb.addColorStop(0.4,'rgba(255,160,40,0.95)');
  gb.addColorStop(1,'rgba(140,40,0,0.2)');
  ctx.beginPath();ctx.arc(fallenX,fallenY,Math.max(2,r),0,Math.PI*2);
  ctx.fillStyle=gb;ctx.fill();
  ctx.restore();
}

// 風インジケーター
function drawWindIndicator(){
  const el=document.getElementById('wind-indicator');
  if(windStrength<0.05){el.textContent='';return;}
  const bars=Math.ceil(windStrength*5);
  const sym=['·','▸','▸▸','▸▸▸','▸▸▸▸','▸▸▸▸▸'][bars]||'';
  el.textContent=`wind  ${sym}`;
  el.style.color=`rgba(255,${200-bars*30},80,${0.2+windStrength*0.5})`;
}

let clearP=[];
function startClear(){
  state='clear';
  for(let i=0;i<60;i++){
    const a=Math.random()*Math.PI*2,spd=1+Math.random()*4;
    clearP.push({x:W/2,y:H*0.5,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2,
      life:80+Math.random()*60,maxLife:140,size:1+Math.random()*2,
      col:['#ffcc44','#ff8822','#ffee88','#ffffff'][Math.floor(Math.random()*4)]});
  }
  playBuffer('hanabi3',false,0.7);
}
function drawClear(){
  clearP=clearP.filter(p=>p.life>0);
  for(const p of clearP){p.x+=p.vx;p.y+=p.vy;p.vy+=0.04;p.vx*=0.98;p.life--;}
  for(const p of clearP){
    const a=(p.life/p.maxLife)*0.9;
    ctx.save();ctx.globalAlpha=a;ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=5;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();ctx.restore();
  }
}

let branchTimer=0;

function loop(){
  requestAnimationFrame(loop);
  frame++;
  // playingは残像あり、それ以外は完全に消す
  if(state==='playing'){
    ctx.fillStyle='rgba(10,14,13,0.72)';
  } else {
    ctx.fillStyle='rgb(10,14,13)';
  }
  ctx.fillRect(0,0,W,H);
  if(state==='idle')return;

  if(state==='playing'){
    elapsed=(Date.now()-startTime)/1000;
    document.getElementById('timer').textContent=elapsed.toFixed(1);
    updateWind();
    drawWindIndicator();

    let ns=0;
    for(let i=STAGE_T.length-1;i>=0;i--){if(elapsed>=STAGE_T[i]){ns=i;break;}}
    if(ns!==stage){
      stage=ns;liveBranches=[];playStageSound();
      const ball=getBall();addSpark(ball,12,true);
    }
    document.getElementById('sname').textContent=STAGE_NAMES[stage];

    if(elapsed>=MAX_T){handleClear();return;}

    const nf=naturalForce();
    // ジャイロ入力をmouseDeltaに合成
    if(gyroEnabled && prevGyroGamma!==null){
      const gDiff = gyroGamma - prevGyroGamma;
      // gammaの変化量をmouseDelta相当に変換（感度調整）
      mouseDelta += gDiff * 4.5;
    }
    prevGyroGamma = gyroEnabled ? gyroGamma : null;
    updateRope(nf,mouseDelta);mouseDelta=0;
    const tOff=Math.abs((segA[SEG-1]+segA[SEG-2])/2-Math.PI/2);
    if(tOff>MAX_OFF){triggerFall();return;}

    const ball=getBall();
    if(stage>0){
      const cfg=STAGE_CFG[stage];branchTimer++;
      if(branchTimer>=cfg.spawnRate){branchTimer=0;spawnBranch(ball);}
    }
    updateBranches(ball);
    if(frame%4===0)addSpark(ball,1,false);
    if(frame%24===0)addEmber(ball,1);
    updateParticles();drawParticles();drawBranches();drawRopeAndBall();
    updateMsg();
  }
  if(state==='falling'){updateParticles();drawParticles();drawFallen();}
  if(state==='clear'){drawParticles();drawFallen();drawClear();}
}

function updateMsg(){
  const msg=document.getElementById('msg');
  const off=segA[SEG-1]-Math.PI/2,d=Math.abs(off)/MAX_OFF;
  if(d>0.68){msg.textContent=off>0?'右に傾いている——':'左に傾いている——';msg.style.color='rgba(255,70,30,0.85)';}
  else if(d>0.4){msg.textContent=off>0?'やや右…':'やや左…';msg.style.color='rgba(255,150,50,0.65)';}
  else if(windStrength>0.3){msg.textContent='風……';msg.style.color='rgba(180,210,255,0.45)';}
  else if(elapsed<5){msg.textContent='揺れに合わせて、そっと。';msg.style.color='rgba(255,255,255,0.35)';}
  else if(elapsed<STAGE_T[1]-3){msg.textContent='そのまま……';msg.style.color='rgba(255,255,255,0.25)';}
  else{msg.textContent='';}
}

function triggerFall(){
  state='falling';
  const ball=getBall();
  fallenX=ball.x;fallenY=ball.y;fallVY=0;ballFallen=true;
  ropeVisible=false;
  liveBranches=[];
  addEmber(ball,20);addSpark(ball,14,true);
  stopAmbientSound();
  playFallSound();
  try{if(navigator.vibrate)navigator.vibrate([30,20,60]);}catch(e){}
  const ft=elapsed;
  document.getElementById('ov-label').style.display='block';
  document.getElementById('ov-time').style.display='block';document.getElementById('ov-time').textContent=ft.toFixed(1);
  document.getElementById('ov-unit').style.display='block';
  document.getElementById('ov-rec').style.display='block';
  document.getElementById('ov-title').style.display='none';
  document.getElementById('ov-sub').style.display='none';
  const rec=document.getElementById('ov-rec');
  if(ft>bestTime){bestTime=ft;rec.textContent='★ 新記録！';rec.style.color='rgba(255,190,60,0.85)';document.getElementById('best').textContent=`best  ${bestTime.toFixed(1)}s`;}
  else{rec.textContent=`記録  ${bestTime.toFixed(1)}s`;rec.style.color='rgba(255,255,255,0.22)';}
  document.getElementById('ov-btn').textContent='もう一度';
  setTimeout(()=>{document.getElementById('overlay').style.display='flex';},1300);
}

function handleClear(){
  state='clear';
  stopAmbientSound();
  // ボールをポトッと落とす演出
  const ball=getBall();
  fallenX=ball.x;fallenY=ball.y;fallVY=0;ballFallen=true;
  ropeVisible=false;
  liveBranches=[];
  addEmber(ball,10);addSpark(ball,8,false);
  // 少し遅れてクリア演出
  setTimeout(()=>{
    startClear();
    playBuffer('hanabi3',false,0.7);
  },800);
  if(elapsed>bestTime){bestTime=elapsed;document.getElementById('best').textContent=`best  ${bestTime.toFixed(1)}s`;}
  document.getElementById('ov-title').textContent='完燃';document.getElementById('ov-title').style.display='block';
  document.getElementById('ov-sub').textContent='60秒間、燃やし切りました。';document.getElementById('ov-sub').style.display='block';
  document.getElementById('ov-label').style.display='none';
  document.getElementById('ov-time').style.display='none';document.getElementById('ov-unit').style.display='none';
  document.getElementById('ov-rec').style.display='none';
  document.getElementById('ov-btn').textContent='もう一度';
  setTimeout(()=>{document.getElementById('overlay').style.display='flex';},3200);
}

async function startGame(){
  document.getElementById('overlay').style.display='none';
  if(!audioCtx){
    await initAudio();
    await initMic();
    await initGyro();
  }
  if(audioCtx.state==='suspended') await audioCtx.resume();
  state='playing';startTime=Date.now();elapsed=0;frame=0;stage=0;
  segA=new Array(SEG).fill(Math.PI/2);segV=new Array(SEG).fill(0);
  segV[SEG-1]=(Math.random()-0.5)*0.008;
  ballFallen=false;ropeVisible=true;particles=[];liveBranches=[];clearP=[];
  prevMX=-999;mouseDelta=0;branchTimer=0;windStrength=0;windImpulse=0;prevGyroGamma=null;
  initNoise();
  startAmbientSound();
  document.getElementById('timer').textContent='0.0';
  document.getElementById('sname').textContent='蕾';
  document.getElementById('msg').textContent='揺れに合わせて、そっと。';
  document.getElementById('msg').style.color='rgba(255,255,255,0.35)';
}

document.getElementById('gw').addEventListener('mousemove',e=>{
  if(state!=='playing')return;
  const r=canvas.getBoundingClientRect(),nx=e.clientX-r.left;
  if(prevMX!==-999)mouseDelta+=(nx-prevMX);prevMX=nx;
});
document.getElementById('gw').addEventListener('mouseleave',()=>{prevMX=-999;});

let prevTX=-999;
document.getElementById('gw').addEventListener('touchmove',e=>{
  if(state!=='playing')return;e.preventDefault();
  const nx=e.touches[0].clientX;
  if(prevTX!==-999)mouseDelta+=(nx-prevTX);prevTX=nx;
},{passive:false});
document.getElementById('gw').addEventListener('touchend',()=>{prevTX=-999;});

loop();
</script>
</body>
